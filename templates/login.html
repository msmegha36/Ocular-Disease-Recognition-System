<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ocularis Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/eye.png') }}" alt="Eye">
        </div>

        <h1>OCULARIS</h1>
        <p class="tagline">Vision for a Healthier System</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <p style="color: {% if category == 'success' %}#2ecc71{% else %}#e74c3c{% endif %}; font-size: 0.85rem; margin-bottom: 15px;">
                {{ message }}
              </p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="USERNAME" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="PASSWORD" required>
            </div>
            <button type="submit">LOGIN</button>
        </form>

        <div class="links">
            <a href="{{ url_for('register') }}">Create Account</a>
        </div>
    </div>
</div>
</body>
</html>
