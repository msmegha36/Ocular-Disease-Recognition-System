<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocularis | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --error: #ef4444;
            --text-main: #1e293b;
            --bg-body: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background: white !important;
            padding: 1rem 0;
            width: 100%;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        /* Validation Styles */
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--primary);
        }

        .is-valid-input {
            border-color: var(--success) !important;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'%3e%3cpath fill='%2322c55e' d='M2.3 6.73L.6 4.53c-.4-1.04.46-1.4 1.1-.8l1.1 1.4 3.4-3.8c.6-.63 1.6-.27 1.2.7l-4 4.6c-.43.5-.8.4-1.1.1z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right calc(0.375em + 0.1875rem) center;
            background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
        }

        .is-invalid-input {
            border-color: var(--error) !important;
        }

        .validation-msg {
            font-size: 0.75rem;
            margin-top: 4px;
            display: none;
        }

        .btn-signin {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 1.5rem;
            transition: 0.3s;
        }

        .btn-signin:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        footer {
            background: #0f172a;
            color: #94a3b8;
            padding: 2rem 0;
            width: 100%;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}" style="color: var(--primary) !important;">
                <i class="fa-solid fa-eye me-2"></i>OCULARIS
            </a>
            <div class="ms-auto">
                <a class="nav-link fw-semibold text-dark" href="{{ url_for('index') }}">Home</a>
            </div>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="mb-4">
                <img src="{{ url_for('static', filename='images/eye.png') }}" alt="Ocularis Logo" style="width: 50px;">
                <h2 class="fw-extrabold mt-3 mb-1" style="letter-spacing: -1px;">LOGIN</h2>
                <p class="text-muted small">Vision for a Healthier System</p>
            </div>

            <form method="POST" id="loginForm">
                <div class="text-start mb-3">
                    <label class="form-label small fw-bold text-uppercase text-secondary">Email Address</label>
                    <input type="email" name="username" id="emailInput" class="form-control" placeholder="doctor@hospital.com" required>
                    <div id="emailMsg" class="validation-msg text-danger">Please enter a valid email address.</div>
                </div>
                <div class="text-start mb-4">
                    <label class="form-label small fw-bold text-uppercase text-secondary">Password</label>
                    <input type="password" name="password" id="passInput" class="form-control" placeholder="••••••••" required>
                    <div id="passMsg" class="validation-msg text-danger">Password must be at least 6 characters.</div>
                </div>
                <button type="submit" id="submitBtn" class="btn-signin">SIGN IN</button>
            </form>

            <div class="mt-4 pt-3 border-top">
                <p class="small text-muted mb-0">Don't have an account? 
                    <a href="{{ url_for('register') }}" class="text-primary fw-bold text-decoration-none">Create Account</a>
                </p>
            </div>
        </div>
    </div>

    <footer class="text-center">
        <div class="container">
            <h6 class="fw-bold text-white mb-2">OCULARIS</h6>
            <p class="small mb-0">&copy; 2026 Ocularis Diagnostic System. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        const emailInput = document.getElementById('emailInput');
        const passInput = document.getElementById('passInput');
        const submitBtn = document.getElementById('submitBtn');
        const emailMsg = document.getElementById('emailMsg');
        const passMsg = document.getElementById('passMsg');

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function checkForm() {
            const isEmailValid = validateEmail(emailInput.value);
            const isPassValid = passInput.value.length >= 6;

            // Email UI
            if (emailInput.value === "") {
                emailInput.classList.remove('is-valid-input', 'is-invalid-input');
                emailMsg.style.display = 'none';
            } else if (isEmailValid) {
                emailInput.classList.add('is-valid-input');
                emailInput.classList.remove('is-invalid-input');
                emailMsg.style.display = 'none';
            } else {
                emailInput.classList.add('is-invalid-input');
                emailInput.classList.remove('is-valid-input');
                emailMsg.style.display = 'block';
            }

            // Password UI
            if (passInput.value === "") {
                passInput.classList.remove('is-valid-input', 'is-invalid-input');
                passMsg.style.display = 'none';
            } else if (isPassValid) {
                passInput.classList.add('is-valid-input');
                passInput.classList.remove('is-invalid-input');
                passMsg.style.display = 'none';
            } else {
                passInput.classList.add('is-invalid-input');
                passInput.classList.remove('is-valid-input');
                passMsg.style.display = 'block';
            }

            // Disable button if invalid
            submitBtn.disabled = !(isEmailValid && isPassValid);
        }

        emailInput.addEventListener('input', checkForm);
        passInput.addEventListener('input', checkForm);
    </script>
</body>
</html>
