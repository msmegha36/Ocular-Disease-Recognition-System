<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocularis | Upload Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-body: #f1f5f9;
            --sidebar-width: 260px;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Responsive Sidebar Logic */
        @media (min-width: 992px) {
            .main-content {
                margin-left: var(--sidebar-width);
                padding: 40px;
            }
        }

        @media (max-width: 991.98px) {
            .main-content {
                margin-left: 0;
                padding: 80px 15px 30px 15px;
            }
            .mobile-toggle {
                display: block;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 1100;
            }
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-section {
            width: 100%;
            max-width: 850px;
            margin-bottom: 25px;
        }

        .upload-card {
            background: var(--white);
            width: 100%;
            max-width: 850px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        @media (min-width: 768px) {
            .upload-card { padding: 40px; }
        }

        /* FORM LOGIC */
        .input-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .lookup-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        @media (min-width: 576px) {
            .lookup-row {
                flex-direction: row;
                align-items: flex-end;
            }
        }

        .input-field-wrapper { flex: 1; width: 100%; }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .verify-btn {
            width: 100%;
            padding: 12px 24px;
            background: var(--white);
            border: 1.5px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        @media (min-width: 576px) {
            .verify-btn { width: auto; }
        }

        .verify-btn:hover { background: var(--primary); color: var(--white); }

        /* PATIENT INFO BANNER */
        .info-banner {
            display: none;
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            color: #0369a1;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* UPLOAD GRID */
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 35px;
        }

        @media (min-width: 768px) {
            .upload-grid {
                grid-template-columns: 1fr 1fr;
                gap: 24px;
            }
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            padding: 35px 15px;
            border-radius: 14px;
            text-align: center;
            background: #fbfcfd;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .drop-zone i { font-size: 1.8rem; color: var(--text-dim); margin-bottom: 12px; }
        .drop-zone:hover { border-color: var(--primary); background: #eff6ff; }
        .drop-zone.file-selected { border-color: #059669; background: #ecfdf5; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:hover { background: var(--primary-hover); }

        .mobile-toggle {
            display: none;
        }
    </style>
</head>
<body>

    <button class="btn btn-primary mobile-toggle shadow d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
        <i class="fa-solid fa-bars"></i>
    </button>

    {% include 'navbar.html' %}

    <main class="main-content">
        <div class="header-section text-center text-md-start">
            <h1 style="font-size: 1.8rem; font-weight: 700;">New Diagnostic Session</h1>
            <p style="color: var(--text-dim); margin-top: 5px;">Initiate an automated retinal analysis by uploading bilateral fundus scans.</p>
        </div>

        <div class="upload-card">
            <form method="POST" action="/upload" enctype="multipart/form-data">
                
                <div class="lookup-row">
                    <div class="input-field-wrapper">
                        <label class="input-label">Patient ID Verification</label>
                        <input type="text" name="patient_id" id="patient_id" placeholder="Enter Patient ID (e.g., P-1002)" required>
                    </div>
                    <button type="button" class="verify-btn" onclick="fetchPatient()">
                        <i class="fa-solid fa-magnifying-glass"></i> Verify
                    </button>
                </div>

                <div id="patient-banner" class="info-banner">
                    <div class="d-flex align-items-center flex-wrap gap-2">
                        <i class="fa-solid fa-circle-check"></i>
                        <strong>Patient Record Found:</strong> 
                        <span id="disp-name" class="fw-bold"></span>
                        <span class="d-none d-sm-inline">|</span>
                        <span><span id="disp-age"></span> Yrs</span>
                        <span class="d-none d-sm-inline">|</span>
                        <span id="disp-gender"></span>
                    </div>
                </div>

                <label class="input-label">Retinal Image Upload (Required)</label>
                <div class="upload-grid">
                    <div class="drop-zone" id="l_zone" onclick="document.getElementById('l_file').click()">
                        <i class="fa-solid fa-eye"></i>
                        <p style="margin:0; font-weight:600;">Left Eye (OS)</p>
                        <input type="file" id="l_file" name="left_eye" style="display:none;" required onchange="updateLabel('l')">
                        <span id="l_status" style="font-size:12px; color:#059669; font-weight: 600; display:block; margin-top:8px;"></span>
                    </div>

                    <div class="drop-zone" id="r_zone" onclick="document.getElementById('r_file').click()">
                        <i class="fa-solid fa-eye"></i>
                        <p style="margin:0; font-weight:600;">Right Eye (OD)</p>
                        <input type="file" id="r_file" name="right_eye" style="display:none;" required onchange="updateLabel('r')">
                        <span id="r_status" style="font-size:12px; color:#059669; font-weight: 600; display:block; margin-top:8px;"></span>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-microscope"></i> &nbsp; Run Diagnostic Analysis
                </button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const p_id = urlParams.get('p_id');
            if (p_id) {
                document.getElementById('patient_id').value = p_id;
                fetchPatient();
            }
        };

        async function fetchPatient() {
            const pid = document.getElementById('patient_id').value;
            if (!pid) return alert("Please enter a Patient ID first.");
            try {
                const response = await fetch(`/get_patient/${pid}`);
                const data = await response.json();
                if (data.success) {
                    const banner = document.getElementById('patient-banner');
                    banner.style.display = 'block';
                    document.getElementById('disp-name').innerText = data.name;
                    document.getElementById('disp-age').innerText = data.age;
                    document.getElementById('disp-gender').innerText = data.gender;
                } else {
                    alert("Patient ID not found in Ocularis database.");
                }
            } catch (err) {
                console.error("Verification error:", err);
            }
        }

        function updateLabel(side) {
            const input = document.getElementById(side + '_file');
            const status = document.getElementById(side + '_status');
            const zone = document.getElementById(side + '_zone');
            if (input.files.length > 0) {
                status.innerText = "✓ Selected: " + input.files[0].name;
                zone.classList.add('file-selected');
                zone.querySelector('i').style.color = "#059669";
            }
        }
    </script>
</body>
</html>
