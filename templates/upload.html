<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocularis | Upload Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0e14; --sidebar-bg: #151921; --card-bg: #1c222d;
            --accent-blue: #3498db; --text-main: #e0e6ed; --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at center, #1a2a44 0%, #0b0e14 100%);
            font-family: 'Inter', sans-serif; color: var(--text-main);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        .sidebar {
            width: 240px; background-color: var(--sidebar-bg);
            display: flex; flex-direction: column; padding: 20px 0;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .brand { padding: 0 25px 40px; display: flex; align-items: center; gap: 12px; }
        .brand span { font-weight: 600; font-size: 1.2rem; color: var(--accent-blue); }

        .nav-item {
            padding: 15px 25px; display: flex; align-items: center;
            color: var(--text-dim); text-decoration: none; transition: 0.3s;
            border-left: 3px solid transparent;
        }
        .nav-item.active { background: rgba(52, 152, 219, 0.1); color: var(--text-main); border-left-color: var(--accent-blue); }

        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }

        .upload-container {
            background: var(--card-bg); width: 100%; max-width: 800px;
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Patient Info Styling */
        .patient-info-grid {
            display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 25px;
        }
        .input-group { text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; }
        .input-group input, .input-group select {
            width: 100%; padding: 10px; background: #0b0e14; border: 1px solid #34495e;
            color: white; border-radius: 8px; outline: none;
        }

        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .drop-zone {
            border: 2px dashed #34495e; border-radius: 15px; padding: 30px 15px;
            transition: 0.3s; cursor: pointer; position: relative; background: rgba(255,255,255,0.02); text-align: center;
        }
        .drop-zone:hover { border-color: var(--accent-blue); background: rgba(52, 152, 219, 0.05); }
        input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }

        .btn-predict {
            background: linear-gradient(135deg, #3498db, #2980b9); color: white;
            border: none; padding: 15px; border-radius: 10px; font-size: 1.1rem;
            font-weight: 600; cursor: pointer; width: 100%; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><span>OCULARIS</span></div>
        <nav class="nav-links">
            <a href="{{ url_for('dashboard') }}" class="nav-item">Dashboard</a>
            <a href="{{ url_for('upload') }}" class="nav-item active">New Upload</a>
            <a href="{{ url_for('logout') }}" class="nav-item">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="upload-container">
            <h2 style="margin-top:0;">New Diagnostic Session</h2>
            
            <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
                <div class="patient-info-grid">
                    <div class="input-group">
                        <label>Patient Full Name</label>
                        <input type="text" name="patient_name" placeholder="John Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" name="patient_age" placeholder="30" required>
                    </div>
                    <div class="input-group">
                        <label>Gender</label>
                        <select name="patient_gender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="upload-grid">
                    <div class="drop-zone">
                        <p id="label-left">Left Eye (OS)</p>
                        <input type="file" name="left_eye" accept="image/*" required onchange="previewFile('left')">
                        <span id="name-left" style="color:var(--accent-blue); font-size:0.8rem;"></span>
                    </div>

                    <div class="drop-zone">
                        <p id="label-right">Right Eye (OD)</p>
                        <input type="file" name="right_eye" accept="image/*" required onchange="previewFile('right')">
                        <span id="name-right" style="color:var(--accent-blue); font-size:0.8rem;"></span>
                    </div>
                </div>

                <button type="submit" class="btn-predict">Analyze & Save Record</button>
            </form>
        </div>
    </div>

    <script>
        function previewFile(side) {
            const input = document.querySelector(`input[name="${side}_eye"]`);
            const label = document.getElementById(`name-${side}`);
            if (input.files.length > 0) {
                label.innerText = "✓ " + input.files[0].name;
            }
        }
    </script>
</body>
</html>
