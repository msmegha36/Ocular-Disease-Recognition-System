<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Ocularis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/eye.png') }}" alt="Logo">
        </div>

        <h1>Create Account</h1>
        <p class="tagline">Doctor Registration</p>

        <form method="POST">
            <div class="input-group">
                <input type="text" name="name" placeholder="FULL NAME" required>
            </div>
            <div class="input-group">
                <input type="email" name="email" placeholder="EMAIL ADDRESS" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="CREATE PASSWORD" required>
            </div>
            <div class="input-group">
                <input type="text" name="specialization" placeholder="MEDICAL SPECIALIZATION">
            </div>
            <div class="input-group">
                <input type="text" name="hospital" placeholder="HOSPITAL/CLINIC NAME">
            </div>
            <button type="submit">REGISTER ACCOUNT</button>
        </form>

        <div class="links">
            <a href="{{ url_for('login') }}">← Back to Login</a>
        </div>
    </div>
</div>
</body>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
