<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Medical Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/eye.png') }}" alt="Logo">
        </div>

        <h1>Create Account</h1>
        <p class="tagline">Doctor Registration</p>

        <form method="POST">
            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Create Password" required>
                <input type="text" name="specialization" placeholder="Medical Specialization">
                <input type="text" name="hospital" placeholder="Hospital/Clinic Name">
            </div>

            <button type="submit">Register Account</button>
        </form>

        <div class="links">
            <a href="/">← Back to Login</a>
        </div>
    </div>
</div>

</body>
</html>
