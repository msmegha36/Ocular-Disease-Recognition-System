<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="login-box" style="width:480px;">

    <div class="logo">
        <img src="{{ url_for('static', filename='images/eye.png') }}">
    </div>

    <h1>Create Account</h1>
    <p class="tagline">Doctor Registration</p>

    <form method="POST">
        <input type="text" name="name" placeholder="Doctor Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="text" name="specialization" placeholder="Specialization">
        <input type="text" name="hospital" placeholder="Hospital">

        <button type="submit">Register</button>
    </form>

    <br>
    <a href="/" style="color:#cfd8ff;">← Back to Login</a>

</div>

</body>
</html>
